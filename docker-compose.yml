services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: helpdesk-api
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
      - api_bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: helpdesk
      DB_USERNAME: helpdesk
      DB_PASSWORD: helpdesk
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: helpdesk-app
    ports:
      - "4200:4200"
    volumes:
      - ./app:/usr/src/app
      - app_node_modules:/usr/src/app/node_modules
    environment:
      API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    container_name: helpdesk-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: helpdesk
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  app_node_modules:
  api_vendor:
  api_bootstrap_cache:
