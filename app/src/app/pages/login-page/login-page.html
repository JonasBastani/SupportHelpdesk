<section class="login-shell" aria-labelledby="login-title">
  <div class="login-copy">
    <p class="eyebrow">Acesso do atendente</p>
    <h1 id="login-title">Entre para gerenciar chamados</h1>
    <p>
      A listagem e o cadastro ficam publicos. Apos o login, voce pode visualizar
      detalhes, editar, excluir e avancar o progresso dos chamados.
    </p>
  </div>

  <form class="login-panel" [formGroup]="loginForm" (ngSubmit)="submit()">
    <h2>Login</h2>

    @if (errorMessage() !== null) {
      <p class="feedback error" role="alert">{{ errorMessage() }}</p>
    }

    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="email" placeholder="ana@example.com" />
    </label>

    <label>
      <span>Senha</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    <button class="primary-action" type="submit" [disabled]="loading()">
      {{ loading() ? 'Entrando...' : 'Entrar' }}
    </button>

    <a routerLink="/chamados">Voltar para chamados</a>
  </form>
</section>
