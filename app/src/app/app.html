<header class="app-header">
  <a class="brand" routerLink="/chamados" aria-label="Ir para chamados">
    <span class="brand-mark">HD</span>
    <span>
      <strong>Helpdesk</strong>
      <small>Suporte interno</small>
    </span>
  </a>

  <nav class="main-nav" aria-label="Navegacao principal">
    <a routerLink="/chamados" routerLinkActive="active-link">Chamados</a>
  </nav>

  <div class="session-actions">
    <button class="theme-toggle" type="button" (click)="toggleTheme()">
      {{ theme() === 'light' ? 'Modo escuro' : 'Modo claro' }}
    </button>

    @if (isAuthenticated()) {
      <span class="user-pill">{{ user()?.name }}</span>
      <button class="logout-button" type="button" (click)="logout()">Sair</button>
    } @else {
      <a class="login-button" routerLink="/login">Entrar</a>
    }
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>
